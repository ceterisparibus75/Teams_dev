name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --ci

      - name: Build
        run: npm run build
        env:
          # Valeurs factices : build ne doit pas dépendre des secrets runtime
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci
          DIRECT_URL: postgresql://user:pass@localhost:5432/ci
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret-32-bytes-long
          AZURE_AD_CLIENT_ID: ci
          AZURE_AD_CLIENT_SECRET: ci
          AZURE_AD_TENANT_ID: ci
          ANTHROPIC_API_KEY: ci
          OPENAI_API_KEY: ci
          CRON_SECRET: ci
          BOT_SECRET: ci
